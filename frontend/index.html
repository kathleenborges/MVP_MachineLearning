<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Predictor - MVP 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>🍷 Classificador de Vinhos</h2>
    <p class="subtitle">Insira as características químicas:</p>
    
    <form id="wineForm">
        <div class="grid">
            <div class="input-group"><label>Acidez Fixa</label><input type="number" step="0.1" id="f1" required value="7.4"></div>
            <div class="input-group"><label>Acidez Volátil</label><input type="number" step="0.01" id="f2" required value="0.7"></div>
            <div class="input-group"><label>Ácido Cítrico</label><input type="number" step="0.01" id="f3" required value="0.0"></div>
            <div class="input-group"><label>Açúcar Residual</label><input type="number" step="0.1" id="f4" required value="1.9"></div>
            <div class="input-group"><label>Cloretos</label><input type="number" step="0.001" id="f5" required value="0.076"></div>
            <div class="input-group"><label>Dióxido Enxofre Livre</label><input type="number" id="f6" required value="11"></div>
            <div class="input-group"><label>Dióxido Enxofre Total</label><input type="number" id="f7" required value="34"></div>
            <div class="input-group"><label>Densidade</label><input type="number" step="0.0001" id="f8" required value="0.9978"></div>
            <div class="input-group"><label>pH</label><input type="number" step="0.01" id="f9" required value="3.51"></div>
            <div class="input-group"><label>Sulfatos</label><input type="number" step="0.01" id="f10" required value="0.56"></div>
            <div class="input-group full-width"><label>Álcool (%)</label><input type="number" step="0.1" id="f11" required value="9.4"></div>
        </div>
        <button type="submit" id="btnAnalisar">Analisar Qualidade</button>
    </form>

    <div id="resultado"></div>
</div>

<script src="script.js"></script>

</body>
</html>
